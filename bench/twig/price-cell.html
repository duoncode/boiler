{% if product.compareAt > product.price %}
    <span class="price-current">${{ product.price|number_format(2) }}</span>
    <span class="price-old">${{ product.compareAt|number_format(2) }}</span>
    <span class="price-save">Save {{ product.discountPercent }}%</span>
{% else %}
    <span class="price-current">${{ product.price|number_format(2) }}</span>
{% endif %}
{% if product.freeShipping %}
    <span class="shipping">Free shipping</span>
{% endif %}
