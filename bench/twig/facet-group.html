<section class="facet-group">
    <h4>{{ facet.title|trim|upper }}</h4>

    {% if facet.expanded %}
        <ul>
            {% for option in facet.options %}
                <li class="{{ option.selected ? 'selected' : 'idle' }}">
                    <span>{{ option.label|trim }}</span>
                    <small>({{ option.count }})</small>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Collapsed</p>
    {% endif %}
</section>
